server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name wisatakaur.com www.wisatakaur.com;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    ssl_certificate /etc/letsencrypt/live/wisatakaur.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/wisatakaur.com/privkey.pem; # managed by Certbot
}

server {
    if ($host = wisatakaur.com) {
        return 301 https://$host$request_uri;
    } 

    listen 80;
    listen [::]:80;

    server_name wisatakaur.com www.wisatakaur.com;

    return 301 https://$host$request_uri;
}
